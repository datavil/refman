name: CI

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Select newest Xcode (macOS 26 SDK for the current system appearance)
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: extension/package-lock.json
      - name: Build and test
        run: swift test
      - name: Build and test Chrome extension
        working-directory: extension
        run: |
          npm ci
          npm test
          npm run build
      - name: Smoke-check packaged resources
        run: |
          SKIP_CODESIGN=1 VERSION=ci scripts/build_app.sh
          dist/Refman.app/Contents/MacOS/Refman --check-resources

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-26
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Select newest Xcode (macOS 26 SDK for the current system appearance)
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: extension/package-lock.json
      - name: Build app bundle
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          VERSION="${VERSION#v}" scripts/build_app.sh
      - name: Package zip
        run: |
          ditto -c -k --keepParent dist/Refman.app "Refman-${{ github.ref_name }}.zip"
      - name: Package Chrome extension
        working-directory: extension
        run: |
          npm ci
          npm test
          npm run package
          cp refman-chrome-extension.zip "../Refman-Chrome-Extension-${{ github.ref_name }}.zip"
      - name: Package dmg
        run: |
          VOL="Refman"
          STAGE=dmg-staging
          rm -rf "$STAGE"
          mkdir -p "$STAGE/.background"
          cp -R dist/Refman.app "$STAGE/"
          cp assets/dmg-background.tiff "$STAGE/.background/background.tiff"
          ln -s /Applications "$STAGE/Applications"
          # Read-write image we can style, then compress to the final read-only dmg.
          hdiutil create -volname "$VOL" -srcfolder "$STAGE" \
            -fs HFS+ -format UDRW -ov rw.dmg
          DEV=$(hdiutil attach -readwrite -noverify -noautoopen rw.dmg \
            | grep '^/dev/' | head -1 | awk '{print $1}')
          sleep 2
          osascript scripts/dmg-window.applescript "$VOL"
          sync
          hdiutil detach "$DEV" || hdiutil detach "$DEV" -force
          hdiutil convert rw.dmg -format UDZO -imagekey zlib-level=9 -ov \
            -o "Refman-${{ github.ref_name }}.dmg"
          rm -f rw.dmg
      - name: Write release notes
        run: |
          cat > release-notes.md <<'EOF'
          ## Install

          Download the `.dmg` (drag Refman to Applications) or the `.zip`.

          Refman is not signed with an Apple Developer ID, so macOS Gatekeeper
          blocks it on first launch ("Apple could not verify… is free of
          malware"). To open it, run this once in Terminal (sudo is needed
          because the app files aren't owned by your user):

          ```
          sudo xattr -dr com.apple.quarantine /Applications/Refman.app
          ```

          Then open Refman normally. (Alternatively, try launching it once, then
          go to **System Settings → Privacy & Security** and click **Open
          Anyway**. On recent macOS the old right-click → Open trick no longer
          works for unsigned apps.)

          ## Chrome extension

          Download `Refman-Chrome-Extension-<version>.zip`, unzip it, then open
          `chrome://extensions`. Enable **Developer mode**, choose **Load
          unpacked**, and select the unzipped folder. With the main Refman
          window focused, press **⌘P** to pair it.
          EOF
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            "Refman-${{ github.ref_name }}.zip" \
            "Refman-${{ github.ref_name }}.dmg" \
            "Refman-Chrome-Extension-${{ github.ref_name }}.zip" \
            --title "${{ github.ref_name }}" \
            --notes-file release-notes.md \
            --generate-notes
